services:
  db:
    image: postgres:16-alpine
    container_name: homeinone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homeinone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homeinone}
      POSTGRES_DB: ${POSTGRES_DB:-homeinone}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homeinone-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homeinone} -d ${POSTGRES_DB:-homeinone}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: homeinone-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - homeinone-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  homeinone-network:
    driver: bridge
